<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Page metadata -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>

    <!-- Favicon -->
    <link
        rel="icon"
        type="image/x-icon"
        href="assets/favicon.ico"
    >

    <!-- Vendor styles -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link
        href="https://unpkg.com/aos@2.3.4/dist/aos.css"
        rel="stylesheet"
    >

    <!-- Project styles -->
    <link
        rel="stylesheet"
        href="assets/css/style.css"
    >
</head>

<body>
    <!-- Shared navbar component -->
    <div id="navbar"></div>

    <!-- Contact section -->
    <section class="page-section">
        <div class="container">
            <div class="row justify-content-center">
                <div
                    class="col-lg-6"
                    data-aos="fade-up"
                >
                    <h1 class="section-title mb-4">
                        Contact
                    </h1>

                    <form>
                        <div class="mb-3">
                            <input
                                type="text"
                                class="form-control"
                                placeholder="Name"
                            >
                        </div>

                        <div class="mb-3">
                            <input
                                type="email"
                                class="form-control"
                                placeholder="Email"
                            >
                        </div>

                        <div class="mb-3">
                            <textarea
                                class="form-control"
                                rows="6"
                                placeholder="Message"
                            ></textarea>
                        </div>

                        <button class="btn btn-gold">
                            Send Message
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <!-- Shared footer component -->
    <div id="footer"></div>

    <!-- Vendor scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

    <!-- Project scripts -->
    <script src="assets/js/main.js"></script>
</body>

</html>
