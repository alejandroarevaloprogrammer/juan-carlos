    <!-- =========================================
         FAVICON
    ========================================== -->

    <link
        rel="icon"
        type="image/x-icon"
        href="assets/favicon.ico"
    >

    <!-- =========================================
         VENDOR STYLES
    ========================================== -->

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link

    ========================================== -->

    <link

        href="assets/css/style.css"
    >

<body>

    <!-- =========================================
         SHARED NAVBAR COMPONENT
    ========================================== -->

    <div id="navbar"></div>

    <!-- =========================================
         CONTACT SECTION
    ========================================== -->

    <section class="page-section">

        <div class="container">

            <div class="row justify-content-center">

                <div
                    class="col-lg-6"
                    data-aos="fade-up"
                >

                    <h1 class="section-title mb-4">
                        Contact
                    </h1>

                    <!-- =========================================
                         CONTACT FORM
                    ========================================== -->

                    <form id="contactForm">

                        <!-- Name field -->

                        <div class="mb-3">

                            <input
                                type="text"
                                class="form-control"
                                id="contactName"
                                placeholder="Name"
                            >

                        </div>

                        <!-- Email field -->

                        <div class="mb-3">

                            <input
                                type="email"
                                class="form-control"
                                id="contactEmail"
                                placeholder="Email"
                            >

                        </div>

                        <!-- Message field -->

                        <div class="mb-3">

                            <textarea
                                class="form-control"
                                id="contactMessage"
                                rows="6"
                                placeholder="Message"
                            ></textarea>

                        </div>

                        <!-- Submit button -->

                        <button
                            type="submit"
                            class="btn btn-gold"
                        >
                            Send Message
                        </button>

                    </form>

                </div>

            </div>

        </div>

    </section>

    <!-- =========================================
         CONTACT STATUS MODAL
    ========================================== -->

    <div
        class="project-modal"
        id="contactModal"
        aria-hidden="true"
    >

        <!-- Modal overlay -->

        <div class="project-modal-overlay"></div>

        <!-- Modal card -->

        <div class="project-modal-card">

            <!-- Close icon -->

            <button
                class="project-modal-close"
                id="closeContactModal"
            >
                ×
            </button>

            <!-- Modal title -->

            <h2
                class="mt-2 mb-4 text-center"
                id="contactModalTitle"
            >
                Contact Status
            </h2>

            <!-- Modal message -->

            <p
                class="text-center"
                id="contactModalMessage"
            ></p>

            <!-- Modal close button -->

            <div class="d-flex justify-content-center mt-4">

                <button
                    type="button"
                    class="btn btn-gold"
                    id="contactModalCloseButton"
                >
                    Close
                </button>

            </div>

        </div>

    </div>

    <!-- =========================================
         SHARED FOOTER COMPONENT
    ========================================== -->

    <div id="footer"></div>

    <!-- =========================================
         VENDOR SCRIPTS
    ========================================== -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

    <!-- =========================================
         EMAILJS
    ========================================== -->

    <script
        src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"
    ></script>

    <!-- =========================================
         PROJECT SCRIPTS
    ========================================== -->

    <script src="assets/js/main.js"></script>

</body>
